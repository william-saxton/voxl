name: Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Linux: native lib + Godot export (self-hosted runner) ──────────────
  build-linux:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Godot export templates (Linux)
        id: cache-templates-linux
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/4.6.stable
          key: godot-templates-linux-4.6-stable

      - name: Download Godot export templates
        if: steps.cache-templates-linux.outputs.cache-hit != 'true'
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O /tmp/templates.zip
          unzip -q /tmp/templates.zip -d /tmp/templates-tmp
          mv /tmp/templates-tmp/templates/* "$TEMPLATE_DIR/"
          rm -rf /tmp/templates.zip /tmp/templates-tmp

      - name: Cache godot-cpp build (Linux)
        id: cache-godotcpp-linux
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
          key: godotcpp-linux-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Build native library (Linux release)
        run: |
          cd native
          scons platform=linux target=template_release -j$(nproc)

      - name: Verify native library
        run: test -f bin/libvoxl_native.linux.template_release.x86_64.so

      - name: Import Godot project
        run: godot --headless --import

      - name: Export Linux build
        run: |
          mkdir -p build
          godot --headless --export-release "Linux" build/VOXL.x86_64

  # ── Windows: native lib + Godot export (GitHub-hosted runner) ──────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: pip install scons

      - name: Cache godot-cpp build (Windows)
        id: cache-godotcpp-windows
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
          key: godotcpp-windows-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Build native library (Windows release)
        shell: bash
        run: |
          cd native
          scons platform=windows target=template_release -j${NUMBER_OF_PROCESSORS:-4}

      - name: Verify native library
        run: |
          if (!(Test-Path "bin\libvoxl_native.windows.template_release.x86_64.dll")) {
            throw "Native library not found"
          }

      - name: Cache Godot + templates (Windows)
        id: cache-godot-windows
        uses: actions/cache@v4
        with:
          path: |
            godot-bin
            ~/AppData/Roaming/Godot/export_templates/4.6.stable
          key: godot-windows-4.6-stable

      - name: Download Godot
        if: steps.cache-godot-windows.outputs.cache-hit != 'true'
        run: |
          $version = "4.6-stable"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v${version}_win64.exe.zip" -OutFile godot.zip
          Expand-Archive godot.zip -DestinationPath godot-bin
          Move-Item "godot-bin\Godot_v${version}_win64.exe" "godot-bin\godot.exe"

      - name: Download Godot export templates
        if: steps.cache-godot-windows.outputs.cache-hit != 'true'
        run: |
          $version = "4.6-stable"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v${version}_export_templates.tpz" -OutFile templates.zip
          $templateDir = "$env:APPDATA\Godot\export_templates\4.6.stable"
          New-Item -ItemType Directory -Force -Path $templateDir
          Expand-Archive templates.zip -DestinationPath templates-tmp
          Move-Item "templates-tmp\templates\*" $templateDir

      - name: Import Godot project
        run: godot-bin\godot.exe --headless --import

      - name: Export Windows build
        run: |
          New-Item -ItemType Directory -Force -Path build
          godot-bin\godot.exe --headless --export-release "Windows Desktop" build\VOXL.exe
