name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux: native lib + Godot export (self-hosted runner) ──────────────
  build-linux:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Godot export templates (Linux)
        id: cache-templates-linux
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/4.6.stable
          key: godot-templates-linux-4.6-stable

      - name: Download Godot export templates
        if: steps.cache-templates-linux.outputs.cache-hit != 'true'
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O /tmp/templates.zip
          unzip -q /tmp/templates.zip -d /tmp/templates-tmp
          mv /tmp/templates-tmp/templates/* "$TEMPLATE_DIR/"
          rm -rf /tmp/templates.zip /tmp/templates-tmp

      - name: Cache godot-cpp build (Linux)
        id: cache-godotcpp-linux
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
            native/godot-cpp/.sconsign.dblite
            native/.sconsign.dblite
          key: godotcpp-linux-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Touch cached godot-cpp files (Linux)
        if: steps.cache-godotcpp-linux.outputs.cache-hit == 'true'
        run: |
          find native/godot-cpp/gen -type f -exec touch {} +
          find native/godot-cpp/bin -type f -exec touch {} +

      - name: Build native library (Linux release)
        run: |
          cd native
          scons platform=linux target=template_release -j$(nproc)

      - name: Verify native library
        run: test -f bin/libvoxl_native.linux.template_release.x86_64.so

      - name: Import Godot project
        run: godot --headless --import

      - name: Export Linux build
        run: |
          mkdir -p build
          godot --headless --export-release "Linux" build/VOXL.x86_64

      - name: Package Linux native library
        run: tar czf bin/libvoxl_native-linux-x86_64.tar.gz -C bin libvoxl_native.linux.template_release.x86_64.so

      - uses: actions/upload-artifact@v4
        with:
          name: linux-native-lib
          path: bin/libvoxl_native-linux-x86_64.tar.gz

      # Bundle the native .so alongside the executable so the GDExtension
      # actually loads at runtime. Without this, the editor falls back to the
      # GDScript implementation. The .gdextension file references the lib at
      # res://bin/libvoxl_native..., which Godot resolves relative to the
      # executable, so the staged layout must mirror that path.
      - name: Package Linux build
        run: |
          chmod +x build/VOXL.x86_64
          STAGE=build/VOXL-linux-x86_64
          mkdir -p "$STAGE/bin"
          find build -maxdepth 1 -name 'VOXL.*' -type f -exec cp {} "$STAGE/" \;
          cp bin/libvoxl_native.linux.template_release.x86_64.so "$STAGE/bin/"
          tar czf build/VOXL-linux-x86_64.tar.gz -C build VOXL-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/VOXL-linux-x86_64.tar.gz

  # ── Windows: cross-compile native lib on Linux, export on Windows ──────
  build-windows-native:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache godot-cpp build (Windows cross-compile)
        id: cache-godotcpp-windows
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
            native/godot-cpp/.sconsign.dblite
            native/.sconsign.dblite
          key: godotcpp-mingw-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Touch cached godot-cpp files (Windows cross-compile)
        if: steps.cache-godotcpp-windows.outputs.cache-hit == 'true'
        run: |
          find native/godot-cpp/gen -type f -exec touch {} +
          find native/godot-cpp/bin -type f -exec touch {} +

      - name: Build native library (Windows cross-compile)
        run: |
          cd native
          scons platform=windows use_mingw=yes target=template_release -j$(nproc)

      - name: Verify native library
        run: test -f bin/libvoxl_native.windows.template_release.x86_64.dll

      - uses: actions/upload-artifact@v4
        with:
          name: windows-native-lib
          path: bin/libvoxl_native.windows.template_release.x86_64.dll

  build-windows-export:
    needs: build-windows-native
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-native-lib
          path: bin

      - name: Cache Godot + templates (Windows)
        id: cache-godot-windows
        uses: actions/cache@v4
        with:
          path: |
            godot-bin
            ~/AppData/Roaming/Godot/export_templates/4.6.stable
          key: godot-windows-4.6-stable

      - name: Download Godot
        if: steps.cache-godot-windows.outputs.cache-hit != 'true'
        run: |
          $version = "4.6-stable"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v${version}_win64.exe.zip" -OutFile godot.zip
          Expand-Archive godot.zip -DestinationPath godot-bin
          Move-Item "godot-bin\Godot_v${version}_win64.exe" "godot-bin\godot.exe"

      - name: Download Godot export templates
        if: steps.cache-godot-windows.outputs.cache-hit != 'true'
        run: |
          $version = "4.6-stable"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v${version}_export_templates.tpz" -OutFile templates.zip
          $templateDir = "$env:APPDATA\Godot\export_templates\4.6.stable"
          New-Item -ItemType Directory -Force -Path $templateDir
          Expand-Archive templates.zip -DestinationPath templates-tmp
          Move-Item "templates-tmp\templates\*" $templateDir

      - name: Import Godot project
        run: godot-bin\godot.exe --headless --import

      - name: Export Windows build
        run: |
          New-Item -ItemType Directory -Force -Path build
          $proc = Start-Process -FilePath "godot-bin\godot.exe" -ArgumentList '--headless --export-release "Windows Desktop" build\VOXL.exe' -Wait -PassThru -NoNewWindow
          Write-Host "Godot exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { throw "Godot export failed with exit code $($proc.ExitCode)" }
          if (!(Test-Path "build\VOXL.exe")) { throw "Export produced no output file" }

      - name: List build output
        if: always()
        run: Get-ChildItem build\ -Recurse -ErrorAction SilentlyContinue

      # Bundle the native .dll alongside VOXL.exe so the GDExtension actually
      # loads at runtime. Without this, the editor falls back to the GDScript
      # implementation. The .gdextension file references the lib at
      # res://bin/libvoxl_native..., which Godot resolves relative to the
      # executable, so the staged layout must mirror that path.
      - name: Package Windows build
        run: |
          $stage = "build\VOXL-windows-x86_64"
          New-Item -ItemType Directory -Force -Path "$stage\bin" | Out-Null
          $files = Get-ChildItem "build\VOXL.*" -File
          if ($files.Count -eq 0) { throw "No build output found" }
          $files | Copy-Item -Destination "$stage\"
          Copy-Item "bin\libvoxl_native.windows.template_release.x86_64.dll" -Destination "$stage\bin\"
          Compress-Archive -Path "$stage" -DestinationPath "build\VOXL-windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/VOXL-windows-x86_64.zip

  # ── Create GitHub Release with all artifacts ──────────────────────────
  release:
    needs: [build-linux, build-windows-export]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The VERSION file holds the major version only (e.g. "0" or "1").
      # The minor version is auto-bumped: we find the highest existing
      # v<MAJOR>.<MINOR>.0 tag and increment MINOR by 1. Patch is always 0.
      # Bump the major manually by editing VERSION when there's a breaking change.
      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAJOR=$(cat VERSION | tr -d '[:space:]')
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "::error::VERSION file must contain a single integer (the major version). Got: '$MAJOR'"
            exit 1
          fi
          LATEST_MINOR=$(git tag -l "v${MAJOR}.*" \
            | grep -E "^v${MAJOR}\.[0-9]+\.[0-9]+$" \
            | sed -E "s/^v${MAJOR}\.([0-9]+)\..*/\1/" \
            | sort -n \
            | tail -1)
          if [ -z "$LATEST_MINOR" ]; then
            NEXT_MINOR=0
            echo "No prior v${MAJOR}.*.* tags — starting at v${MAJOR}.0.0"
          else
            NEXT_MINOR=$((LATEST_MINOR + 1))
            echo "Highest prior minor for major ${MAJOR}: ${LATEST_MINOR} — next is ${NEXT_MINOR}"
          fi
          VERSION="${MAJOR}.${NEXT_MINOR}.0"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed release tag: $TAG"
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. This shouldn't happen with auto-bump; investigate stale tags before retrying."
            exit 1
          fi

      - name: Package Windows native library
        run: |
          cd artifacts/windows-native-lib
          zip libvoxl_native-windows-x86_64.zip libvoxl_native.windows.template_release.x86_64.dll

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "VOXL ${{ steps.version.outputs.tag }}" \
            --notes "$(cat <<'EOF'
          ## Editor Builds
          The editor archives ship with the native GDExtension library bundled in
          `bin/` next to the executable — extract and run, no separate setup.
          - `VOXL-linux-x86_64.tar.gz` — Linux editor (extracts to `VOXL-linux-x86_64/`)
          - `VOXL-windows-x86_64.zip` — Windows editor (extracts to `VOXL-windows-x86_64/`)

          ## Native Library (standalone)
          For embedding the GDExtension in another Godot project:
          - `libvoxl_native-linux-x86_64.tar.gz` — Linux build
          - `libvoxl_native-windows-x86_64.zip` — Windows build

          ## Changes
          PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}

          ${{ github.event.pull_request.body }}
          EOF
          )" \
            artifacts/linux-native-lib/libvoxl_native-linux-x86_64.tar.gz \
            artifacts/windows-native-lib/libvoxl_native-windows-x86_64.zip \
            artifacts/linux-build/VOXL-linux-x86_64.tar.gz \
            artifacts/windows-build/VOXL-windows-x86_64.zip
