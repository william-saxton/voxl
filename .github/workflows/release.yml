name: Release

# Publishes the libvoxl_native GDExtension as standalone GitHub Release
# assets. william-saxton/VOXL-Editor consumes these to build editor releases
# without duplicating the native source. When the game (voxel_world.tscn)
# is ready to ship, add a separate workflow for that.

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux: build native lib ──────────────────────────────────────────────
  build-linux:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache godot-cpp build (Linux)
        id: cache-godotcpp-linux
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
            native/godot-cpp/.sconsign.dblite
            native/.sconsign.dblite
          key: godotcpp-linux-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Touch cached godot-cpp files (Linux)
        if: steps.cache-godotcpp-linux.outputs.cache-hit == 'true'
        run: |
          find native/godot-cpp/gen -type f -exec touch {} +
          find native/godot-cpp/bin -type f -exec touch {} +

      - name: Build native library (Linux release)
        run: |
          cd native
          scons platform=linux target=template_release -j$(nproc)

      - name: Verify native library
        run: test -f bin/libvoxl_native.linux.template_release.x86_64.so

      - name: Package Linux native library
        run: tar czf bin/libvoxl_native-linux-x86_64.tar.gz -C bin libvoxl_native.linux.template_release.x86_64.so

      - uses: actions/upload-artifact@v4
        with:
          name: linux-native-lib
          path: bin/libvoxl_native-linux-x86_64.tar.gz

  # ── Windows: cross-compile native lib on Linux ──────────────────────────
  build-windows-native:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache godot-cpp build (Windows cross-compile)
        id: cache-godotcpp-windows
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
            native/godot-cpp/.sconsign.dblite
            native/.sconsign.dblite
          key: godotcpp-mingw-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Touch cached godot-cpp files (Windows cross-compile)
        if: steps.cache-godotcpp-windows.outputs.cache-hit == 'true'
        run: |
          find native/godot-cpp/gen -type f -exec touch {} +
          find native/godot-cpp/bin -type f -exec touch {} +

      - name: Build native library (Windows cross-compile)
        run: |
          cd native
          scons platform=windows use_mingw=yes target=template_release -j$(nproc)

      - name: Verify native library
        run: test -f bin/libvoxl_native.windows.template_release.x86_64.dll

      - uses: actions/upload-artifact@v4
        with:
          name: windows-native-lib
          path: bin/libvoxl_native.windows.template_release.x86_64.dll

  # ── Create GitHub Release with native lib artifacts ─────────────────────
  release:
    needs: [build-linux, build-windows-native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The VERSION file holds the major version only (e.g. "0" or "1").
      # The minor version is auto-bumped: we find the highest existing
      # v<MAJOR>.<MINOR>.0 tag and increment MINOR by 1. Patch is always 0.
      # Bump the major manually by editing VERSION when there's a breaking change.
      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAJOR=$(cat VERSION | tr -d '[:space:]')
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "::error::VERSION file must contain a single integer (the major version). Got: '$MAJOR'"
            exit 1
          fi
          LATEST_MINOR=$(git tag -l "v${MAJOR}.*" \
            | grep -E "^v${MAJOR}\.[0-9]+\.[0-9]+$" \
            | sed -E "s/^v${MAJOR}\.([0-9]+)\..*/\1/" \
            | sort -n \
            | tail -1)
          if [ -z "$LATEST_MINOR" ]; then
            NEXT_MINOR=0
            echo "No prior v${MAJOR}.*.* tags — starting at v${MAJOR}.0.0"
          else
            NEXT_MINOR=$((LATEST_MINOR + 1))
            echo "Highest prior minor for major ${MAJOR}: ${LATEST_MINOR} — next is ${NEXT_MINOR}"
          fi
          VERSION="${MAJOR}.${NEXT_MINOR}.0"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed release tag: $TAG"
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. This shouldn't happen with auto-bump; investigate stale tags before retrying."
            exit 1
          fi

      - name: Package Windows native library
        run: |
          cd artifacts/windows-native-lib
          zip libvoxl_native-windows-x86_64.zip libvoxl_native.windows.template_release.x86_64.dll

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "libvoxl_native ${{ steps.version.outputs.tag }}" \
            --notes "$(cat <<'EOF'
          ## libvoxl_native — GDExtension native library

          Built from this repo's `native/` source. Consumed by
          [`william-saxton/VOXL-Editor`](https://github.com/william-saxton/VOXL-Editor)
          to build editor releases.

          - `libvoxl_native-linux-x86_64.tar.gz` — Linux build
          - `libvoxl_native-windows-x86_64.zip` — Windows build

          Drop the extracted file into your project's `bin/` folder; the
          `voxl_native.gdextension` manifest references it via
          `res://bin/libvoxl_native.<platform>.template_release.x86_64.<ext>`.

          ## Changes
          PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}

          ${{ github.event.pull_request.body }}
          EOF
          )" \
            artifacts/linux-native-lib/libvoxl_native-linux-x86_64.tar.gz \
            artifacts/windows-native-lib/libvoxl_native-windows-x86_64.zip
