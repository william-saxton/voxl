name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux: native lib + Godot export (self-hosted runner) ──────────────
  build-linux:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Godot export templates (Linux)
        id: cache-templates-linux
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/4.6.stable
          key: godot-templates-linux-4.6-stable

      - name: Download Godot export templates
        if: steps.cache-templates-linux.outputs.cache-hit != 'true'
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O /tmp/templates.zip
          unzip -q /tmp/templates.zip -d /tmp/templates-tmp
          mv /tmp/templates-tmp/templates/* "$TEMPLATE_DIR/"
          rm -rf /tmp/templates.zip /tmp/templates-tmp

      - name: Cache godot-cpp build (Linux)
        id: cache-godotcpp-linux
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
            native/godot-cpp/.sconsign.dblite
            native/.sconsign.dblite
          key: godotcpp-linux-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Touch cached godot-cpp files (Linux)
        if: steps.cache-godotcpp-linux.outputs.cache-hit == 'true'
        run: |
          find native/godot-cpp/gen -type f -exec touch {} +
          find native/godot-cpp/bin -type f -exec touch {} +

      - name: Build native library (Linux release)
        run: |
          cd native
          scons platform=linux target=template_release -j$(nproc)

      - name: Verify native library
        run: test -f bin/libvoxl_native.linux.template_release.x86_64.so

      - name: Import Godot project
        run: godot --headless --import

      - name: Export Linux build
        run: |
          mkdir -p build
          godot --headless --export-release "Linux" build/VOXL.x86_64

      - name: Package Linux build
        run: |
          cd build
          chmod +x VOXL.x86_64
          tar czf VOXL-linux-x86_64.tar.gz VOXL.*

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/VOXL-linux-x86_64.tar.gz

  # ── Windows: cross-compile native lib on Linux, export on Windows ──────
  build-windows-native:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache godot-cpp build (Windows cross-compile)
        id: cache-godotcpp-windows
        uses: actions/cache@v4
        with:
          path: |
            native/godot-cpp/bin
            native/godot-cpp/gen
            native/godot-cpp/.sconsign.dblite
            native/.sconsign.dblite
          key: godotcpp-mingw-release-${{ hashFiles('.gitmodules', 'native/godot-cpp/SConstruct') }}

      - name: Touch cached godot-cpp files (Windows cross-compile)
        if: steps.cache-godotcpp-windows.outputs.cache-hit == 'true'
        run: |
          find native/godot-cpp/gen -type f -exec touch {} +
          find native/godot-cpp/bin -type f -exec touch {} +

      - name: Build native library (Windows cross-compile)
        run: |
          cd native
          scons platform=windows use_mingw=yes target=template_release -j$(nproc)

      - name: Verify native library
        run: test -f bin/libvoxl_native.windows.template_release.x86_64.dll

      - uses: actions/upload-artifact@v4
        with:
          name: windows-native-lib
          path: bin/libvoxl_native.windows.template_release.x86_64.dll

  build-windows-export:
    needs: build-windows-native
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-native-lib
          path: bin

      - name: Cache Godot + templates (Windows)
        id: cache-godot-windows
        uses: actions/cache@v4
        with:
          path: |
            godot-bin
            ~/AppData/Roaming/Godot/export_templates/4.6.stable
          key: godot-windows-4.6-stable

      - name: Download Godot
        if: steps.cache-godot-windows.outputs.cache-hit != 'true'
        run: |
          $version = "4.6-stable"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v${version}_win64.exe.zip" -OutFile godot.zip
          Expand-Archive godot.zip -DestinationPath godot-bin
          Move-Item "godot-bin\Godot_v${version}_win64.exe" "godot-bin\godot.exe"

      - name: Download Godot export templates
        if: steps.cache-godot-windows.outputs.cache-hit != 'true'
        run: |
          $version = "4.6-stable"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v${version}_export_templates.tpz" -OutFile templates.zip
          $templateDir = "$env:APPDATA\Godot\export_templates\4.6.stable"
          New-Item -ItemType Directory -Force -Path $templateDir
          Expand-Archive templates.zip -DestinationPath templates-tmp
          Move-Item "templates-tmp\templates\*" $templateDir

      - name: Import Godot project
        run: godot-bin\godot.exe --headless --import

      - name: Export Windows build
        run: |
          New-Item -ItemType Directory -Force -Path build
          $proc = Start-Process -FilePath "godot-bin\godot.exe" -ArgumentList "--headless","--export-release","Windows Desktop","build\VOXL.exe" -Wait -PassThru -NoNewWindow
          Write-Host "Godot exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { throw "Godot export failed with exit code $($proc.ExitCode)" }
          if (!(Test-Path "build\VOXL.exe")) { throw "Export produced no output file" }

      - name: List build output
        if: always()
        run: Get-ChildItem build\ -Recurse -ErrorAction SilentlyContinue

      - name: Package Windows build
        run: |
          $files = Get-ChildItem "build\VOXL*"
          if ($files.Count -eq 0) { throw "No build output found" }
          Compress-Archive -Path $files.FullName -DestinationPath "build\VOXL-windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/VOXL-windows-x86_64.zip

  # ── Create GitHub Release with both platform builds ────────────────────
  release:
    needs: [build-linux, build-windows-export]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +%Y.%m.%d)-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "VOXL ${{ steps.version.outputs.tag }}" \
            --notes "$(cat <<EOF
          ## Changes
          PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}

          ${{ github.event.pull_request.body }}
          EOF
          )" \
            artifacts/linux-build/VOXL-linux-x86_64.tar.gz \
            artifacts/windows-build/VOXL-windows-x86_64.zip
