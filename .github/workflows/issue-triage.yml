name: Issue Triage & Auto-Fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage:
    name: Triage with Claude Code
    runs-on: [self-hosted, claude]
    # Only run when the 'claude-triage' label is added to an issue.
    if: github.event.label.name == 'claude-triage'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build prompt file
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          cat > /tmp/claude-prompt.txt <<'HEREDOC'
          You are triaging a new GitHub issue for the VOXL project — a Godot 4.6 voxel
          terrain/physics simulation with a C++ GDExtension.
          HEREDOC

          cat >> /tmp/claude-prompt.txt <<HEREDOC

          ## Issue #${ISSUE_NUMBER}
          **Title:** ${ISSUE_TITLE}
          **Author:** ${ISSUE_AUTHOR}
          **Body:**
          ${ISSUE_BODY}

          HEREDOC

          cat >> /tmp/claude-prompt.txt <<'HEREDOC'
          ## Your task

          1. **Analyze the issue.** Read the codebase to understand whether this is:
             - A bug with a clear fix
             - A feature request that is small and self-contained
             - Something too complex, vague, or risky to auto-fix

          2. **Label the issue** using `gh issue edit`. Apply appropriate labels:
             - `bug` or `enhancement`
             - `good-first-issue` if it is simple
             - `claude-can-fix` if you are confident you can fix it
             - `needs-human` if it requires human judgment or is too complex
             Create any labels that don't exist yet with `gh label create`.

          3. **If you can fix it (`claude-can-fix`):**
             - Create a branch: `git checkout -b claude/fix-issue-<ISSUE_NUMBER>`
             - Implement the fix
             - Build the native library to verify:
               `cd native && scons platform=linux target=template_debug -j$(nproc)`
             - Run `godot --headless --import` to verify the project still imports cleanly
             - Commit, push, and create a PR with `gh pr create` linking `Fixes #<ISSUE_NUMBER>`
             - Comment on the issue explaining what you did

          4. **If you cannot fix it:**
             - Comment on the issue (via `gh issue comment`) with your analysis:
               what part of the codebase is relevant, likely cause, and what to look at
             - Apply the `needs-human` label

          ## Project structure
          - GDScript source: scripts/
          - C++ native extension: native/src/
          - Godot scenes: scenes/
          - Shaders: shaders/
          - Build: SCons (native/SConstruct) → outputs to bin/

          Be conservative — only attempt a fix if you are confident it is correct.
          HEREDOC

          # Replace <ISSUE_NUMBER> placeholders in the static part
          sed -i "s/<ISSUE_NUMBER>/${ISSUE_NUMBER}/g" /tmp/claude-prompt.txt

      - name: Triage issue with Claude
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          claude -p \
            --allowedTools 'Bash(git *)' 'Bash(cd native && scons *)' 'Bash(godot --headless *)' 'Bash(gh issue *)' 'Bash(gh pr *)' 'Bash(gh label *)' 'Bash(mkdir *)' 'Read' 'Edit' 'Write' 'Glob' 'Grep' \
            < /tmp/claude-prompt.txt
