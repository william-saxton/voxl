title: VOXL Voxel Editor
description: User guide for the VOXL voxel editor
remote_theme: just-the-docs/just-the-docs

url: https://william-saxton.github.io
baseurl: /voxl

# Theme settings
color_scheme: dark
search_enabled: true
heading_anchors: true

# Aux links shown in top-right of every page
aux_links:
  GitHub repo:
    - https://github.com/william-saxton/voxl

# Footer
footer_content: "VOXL is built with Godot 4.6 and a custom C++ GDExtension."

# Plugins (required for remote_theme on GitHub Pages)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Files Jekyll should NOT process
exclude:
  - voxel_editor_reference.md
  - agentic_llm_asset_creation.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Custom callouts
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Heads up
    color: yellow
